<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CRAZY SPOT — Menu</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Monoton&family=Rajdhani:wght@400;500;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<script>
tailwind.config = { theme:{ extend:{
  fontFamily:{
    neon:['Monoton','cursive'],
    body:['Rajdhani','sans-serif'],
    mono:['"Share Tech Mono"','monospace'],
  },
  colors:{
    abyss:'#020611', cyan:'#00e5ff', blue:'#2979ff', ice:'#bfe9ff',
    steel:'#5d7a99',
  }
}}};
</script>
<style>
:root{ --cyan:#00e5ff; --blue:#2979ff; --ice:#bfe9ff; }
html,body{ background:#020611; height:100%; overflow:hidden; }
::selection{ background:var(--cyan); color:#020611; }

#stage{ position:fixed; inset:0; z-index:0; }

/* ======== letrero neón ======== */
.neon-sign{
  color:var(--ice);
  text-shadow:
    0 0 6px rgba(191,233,255,.9),
    0 0 16px var(--cyan),
    0 0 38px var(--cyan),
    0 0 80px var(--blue),
    0 0 130px var(--blue);
  animation: neonFlicker 9s linear infinite;
}
@keyframes neonFlicker{
  0%,100%{ opacity:1 }
  3.2%{ opacity:.45 } 3.6%{ opacity:1 }
  7.1%{ opacity:.7 } 7.3%{ opacity:1 }
  46%{ opacity:1 } 46.4%{ opacity:.5 } 46.8%{ opacity:1 }
  81%{ opacity:1 } 81.3%{ opacity:.65 } 81.5%{ opacity:1 }
}

/* ======== paneles con borde eléctrico ======== */
.panel{
  position:relative; border-radius:1rem;
  background:
    linear-gradient(165deg, rgba(0,229,255,.055), rgba(2,6,17,.55) 50%),
    rgba(3,10,26,.62);
  box-shadow: inset 0 0 30px rgba(41,121,255,.07);
  backdrop-filter: blur(4px);
}
.panel::before{
  content:''; position:absolute; inset:0; border-radius:1rem; padding:1px;
  background: conic-gradient(from var(--spin,0deg),
    rgba(0,229,255,.0) 0%, rgba(0,229,255,.9) 12%, rgba(41,121,255,.25) 30%,
    rgba(0,229,255,0) 55%, rgba(41,121,255,.7) 78%, rgba(0,229,255,0) 100%);
  -webkit-mask: linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
  -webkit-mask-composite: xor; mask-composite: exclude;
  animation: spin 8s linear infinite;
}
@property --spin{ syntax:'<angle>'; initial-value:0deg; inherits:false; }
@keyframes spin{ to{ --spin:360deg } }

/* ======== cabeceras de categoría ======== */
.cat{
  position:relative; display:inline-block;
  color:var(--cyan); letter-spacing:.3em;
  text-shadow:0 0 12px rgba(0,229,255,.8), 0 0 34px rgba(0,229,255,.4);
}
.cat::after{
  content:''; position:absolute; left:0; bottom:-.45em; height:2px; width:100%;
  background:linear-gradient(90deg, var(--cyan), transparent);
  box-shadow:0 0 12px var(--cyan);
  transform:scaleX(0); transform-origin:left;
  animation: draw 1s cubic-bezier(.2,.8,.3,1) forwards;
  animation-delay: inherit;
}
@keyframes draw{ to{ transform:scaleX(1) } }

.brand{
  color:var(--blue);
  text-shadow:0 0 10px rgba(41,121,255,.7);
}

/* ======== filas ======== */
.row{
  display:flex; align-items:baseline; gap:.6rem;
  padding:.16em .55em .16em .7em;
  border-left:2px solid transparent; border-radius:.2rem;
  transition: background .55s ease, border-color .55s ease, transform .55s ease;
}
.row .leader{
  flex:1; min-width:1rem; transform:translateY(-.3em);
  border-bottom:1px dashed rgba(93,122,153,.45);
}
.row .price{ color:var(--ice); transition: color .5s, text-shadow .5s; }
.row.glow{
  border-left-color:var(--cyan);
  background:linear-gradient(90deg, rgba(0,229,255,.13), rgba(0,229,255,.02) 70%);
  transform:translateX(.25rem);
}
.row.glow .price{ color:var(--cyan); text-shadow:0 0 14px rgba(0,229,255,.9), 0 0 30px rgba(0,229,255,.4); }
.row.glow .name{ color:#fff; text-shadow:0 0 10px rgba(191,233,255,.5); }

/* ======== entrada escalonada ======== */
.item{ opacity:0; transform:translateY(22px); filter:blur(6px);
  animation: rise .85s cubic-bezier(.2,.85,.3,1) forwards; }
@keyframes rise{ to{ opacity:1; transform:none; filter:blur(0) } }

/* ======== barrido de luz global ======== */
.sweep{
  position:fixed; inset:0; z-index:30; pointer-events:none;
  background:linear-gradient(115deg, transparent 42%, rgba(0,229,255,.06) 50%, transparent 58%);
  background-size:300% 100%;
  animation: sweep 13s ease-in-out infinite;
}
@keyframes sweep{ 0%,55%{ background-position:130% 0 } 80%,100%{ background-position:-60% 0 } }

/* punto de estado */
.pulse{ animation:pulse 2s ease-in-out infinite; box-shadow:0 0 12px var(--cyan); }
@keyframes pulse{ 0%,100%{ opacity:.4; transform:scale(.8) } 50%{ opacity:1; transform:scale(1.2) } }

@media (prefers-reduced-motion: reduce){
  .neon-sign,.panel::before,.sweep,.pulse{ animation:none !important; }
  .item{ animation:none; opacity:1; transform:none; filter:none; }
  .cat::after{ animation:none; transform:scaleX(1); }
}
</style>
</head>
<body class="font-body text-ice antialiased">

<canvas id="stage"></canvas>
<div class="sweep"></div>

<main class="relative z-10 h-screen flex flex-col px-[2.6vw] py-[2.2vh]">

  <!-- ======= HEADER ======= -->
  <header class="item flex items-end justify-between pb-[1.6vh]" style="animation-delay:.1s">
    <div>
      <h1 class="font-neon neon-sign text-[3.4vw] leading-none">CRAZY&nbsp;SPOT</h1>
      <p class="text-steel uppercase tracking-[.55em] text-[.78vw] mt-[1vh] pl-1">Social&nbsp;Club&nbsp;·&nbsp;Menu</p>
    </div>
    <div class="flex items-center gap-7">
      <div class="flex items-center gap-2 uppercase tracking-[.3em] text-[.78vw] text-steel">
        <span class="pulse inline-block w-2 h-2 rounded-full bg-cyan"></span> Solo socios
      </div>
      <div id="clock" class="font-mono text-[1.8vw] text-cyan tabular-nums" style="text-shadow:0 0 16px rgba(0,229,255,.7)">--:--</div>
    </div>
  </header>

  <!-- ======= GRID ======= -->
  <section class="flex-1 grid grid-cols-3 gap-[1.3vw] min-h-0">

    <div class="item panel p-[1.2vw] flex flex-col min-h-0" style="animation-delay:.25s">
      <h2 class="cat font-body font-bold uppercase text-[1.35vw] mb-[1.6vh]" style="animation-delay:.6s">Flores</h2>
      <ul id="col-flores" class="flex-1 flex flex-col justify-between text-[1.08vw] font-medium"></ul>
    </div>

    <div class="item panel p-[1.2vw] flex flex-col min-h-0" style="animation-delay:.4s">
      <h2 class="cat font-body font-bold uppercase text-[1.35vw] mb-[1.6vh]" style="animation-delay:.75s">Hash</h2>
      <div id="col-hash" class="flex-1 flex flex-col justify-between text-[1.0vw] font-medium"></div>
    </div>

    <div class="flex flex-col gap-[1.3vw] min-h-0">
      <div class="item panel p-[1.2vw] flex-1 flex flex-col min-h-0" style="animation-delay:.55s">
        <h2 class="cat font-body font-bold uppercase text-[1.35vw] mb-[1.4vh]" style="animation-delay:.9s">Extractos&nbsp;&amp;&nbsp;Más</h2>
        <ul id="col-extra" class="flex-1 flex flex-col justify-around text-[1.1vw] font-medium"></ul>
      </div>
      <div class="item panel p-[1.2vw] flex flex-col" style="animation-delay:.7s">
        <h2 class="cat font-body font-bold uppercase text-[1.35vw] mb-[1.4vh]" style="animation-delay:1.05s">Bebidas</h2>
        <ul id="col-drinks" class="flex flex-col gap-[.6vh] text-[1.1vw] font-medium"></ul>
      </div>
    </div>
  </section>

  <!-- ======= FOOTER ======= -->
  <footer class="item flex items-center justify-between pt-[1.5vh] uppercase tracking-[.4em] text-[.72vw] text-steel" style="animation-delay:.9s">
    <span>Asociación privada · prohibida la venta</span>
    <span class="text-blue/80">consumo responsable · +18</span>
  </footer>
</main>

<script type="importmap">
{ "imports": { "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js" } }
</script>

<script type="module">
import * as THREE from 'three';

/* ============ DATOS ============ */
const FLORES = [
  ['Red Haze','13.50'], ['Event Horizon','18'], ['Zangria','19'],
  ['Garlic Breath','19'], ['Purple Roses','12.50'], ['Crypto Chronic','18'],
  ['Soda Pop','15'], ['Pink Guava','18'], ['Sushi','18'],
  ['Cosmopolis','15'], ['Gas Guzzler','18'], ['Mind Melts','18'],
];
const HASH = [
  ['Most Wanted', [['Permanent Marker','40'],['Gelato 33','50'],['La Kush Cake · Cali Dry','30']]],
  ['Staticroom', [['Glitter Bomb','60'],['Megan Fox','60'],['Pōlen Frozen Sift · Lemon Cherry','40']]],
  ['Sahas Terps', [['Tropical Juice','60'],['Banana Runtz','60']]],
  ['One Stop CA', [['Gusher Mintz','40'],['Amaretto Mintz','40'],['FF Static','28'],['Gmo Static','18'],['WpFF','100']]],
];
const EXTRA  = [['Rosin','150'],['Edibles','25'],['Dirty Sprite','30']];
const DRINKS = [['Agua','1.50'],['Cola','2.50'],['Ice Tea','2.50'],['Redbull','3.00']];

const row = (n,p)=>`
  <div class="row">
    <span class="name">${n}</span>
    <span class="leader"></span>
    <span class="price font-mono" data-price="${p}">0€</span>
  </div>`;

document.getElementById('col-flores').innerHTML = FLORES.map(([n,p])=>`<li>${row(n,p)}</li>`).join('');
document.getElementById('col-hash').innerHTML = HASH.map(([b,items])=>`
  <div>
    <h3 class="brand uppercase tracking-[.3em] text-[.8vw] font-semibold mb-[.5vh]">${b}</h3>
    <ul class="flex flex-col gap-[.2vh]">${items.map(([n,p])=>`<li>${row(n,p)}</li>`).join('')}</ul>
  </div>`).join('');
document.getElementById('col-extra').innerHTML  = EXTRA.map(([n,p])=>`<li>${row(n,p)}</li>`).join('');
document.getElementById('col-drinks').innerHTML = DRINKS.map(([n,p])=>`<li>${row(n,p)}</li>`).join('');

const reduced = matchMedia('(prefers-reduced-motion: reduce)').matches;

/* ============ precios contando hacia arriba ============ */
const prices = [...document.querySelectorAll('.price')];
prices.forEach((el,i)=>{
  const target = parseFloat(el.dataset.price);
  const dec = el.dataset.price.includes('.') ? 2 : 0;
  if (reduced){ el.textContent = target.toFixed(dec)+'€'; return; }
  const t0 = performance.now() + 600 + i*45, dur = 900;
  (function tick(now){
    const k = Math.min(1, (now - t0)/dur);
    if (k>0){
      const e = 1-Math.pow(1-k,3);
      el.textContent = (target*e).toFixed(dec)+'€';
    }
    if (k<1) requestAnimationFrame(tick); else el.textContent = target.toFixed(dec)+'€';
  })(performance.now());
});

/* ============ reloj ============ */
const clock = document.getElementById('clock');
const tickClock = ()=>{ const d=new Date();
  clock.textContent = String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0'); };
tickClock(); setInterval(tickClock, 5000);

/* ============ ciclo de resaltado ============ */
if (!reduced){
  const rows=[...document.querySelectorAll('.row')]; let i=-1;
  setInterval(()=>{
    if(i>=0) rows[i].classList.remove('glow');
    i=(i+1)%rows.length; rows[i].classList.add('glow');
  }, 2400);
}

/* ============ THREE.JS — fondo neón azul ============ */
const canvas = document.getElementById('stage');
const renderer = new THREE.WebGLRenderer({ canvas, antialias:false });
renderer.setPixelRatio(Math.min(devicePixelRatio,2));

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(50,1,.1,100);
camera.position.set(0,0,7);

/* --- shader: aurora eléctrica + rejilla en perspectiva --- */
const U = { uTime:{value:0}, uRes:{value:new THREE.Vector2(1,1)} };
const bg = new THREE.Mesh(new THREE.PlaneGeometry(2,2), new THREE.ShaderMaterial({
  uniforms:U, depthWrite:false, depthTest:false,
  vertexShader:`void main(){ gl_Position=vec4(position.xy,1.,1.); }`,
  fragmentShader:`
    uniform float uTime; uniform vec2 uRes;
    float hash(vec2 p){ return fract(sin(dot(p,vec2(127.1,311.7)))*43758.5453); }
    float noise(vec2 p){ vec2 i=floor(p),f=fract(p); f*=f*(3.-2.*f);
      return mix(mix(hash(i),hash(i+vec2(1,0)),f.x),mix(hash(i+vec2(0,1)),hash(i+vec2(1,1)),f.x),f.y); }
    float fbm(vec2 p){ float v=0.,a=.5; for(int i=0;i<5;i++){ v+=a*noise(p); p=p*2.05+11.3; a*=.55; } return v; }
    void main(){
      vec2 uv = gl_FragCoord.xy/uRes;
      float ar = uRes.x/uRes.y;
      vec2 p = (uv-.5)*vec2(ar,1.);
      float t = uTime;

      vec3 col = vec3(.004,.012,.04);

      /* cortinas de aurora azul */
      float a1 = fbm(vec2(p.x*1.8 + t*.05, p.y*3. - t*.10));
      float a2 = fbm(vec2(p.x*3.5 - t*.08, p.y*1.5 + t*.06) + a1*1.4);
      col += vec3(0.,.35,.55) * pow(smoothstep(.42,1.,a1),2.) * .8;
      col += vec3(.08,.25,.85) * pow(smoothstep(.5,1.,a2),2.2) * .9;
      col += vec3(.55,.9,1.) * pow(smoothstep(.78,1.,a1*a2*1.8),3.) * .8;

      /* rejilla en perspectiva (suelo) */
      if (uv.y < .42){
        float depth = (.42-uv.y)/.42 + .0001;
        float z = 1./depth;
        vec2 g = vec2(p.x*z*1.4, z*1.6 + t*1.2);
        vec2 gridF = abs(fract(g)-.5);
        float line = smoothstep(.48,.5,max(gridF.x,gridF.y));
        float fade = smoothstep(.0,.5,depth);
        col += vec3(0.,.8,1.) * line * fade * .33;
        col += vec3(.1,.3,1.) * fade * .10;
      }

      /* estrellas frías arriba */
      float st = step(.9985, hash(floor(uv*uRes*.5)));
      col += vec3(.6,.85,1.) * st * (.4+.6*sin(t*2.+uv.x*40.)) * smoothstep(.4,.9,uv.y);

      /* viñeta */
      col *= smoothstep(1.35,.4,length(uv-.5));
      gl_FragColor = vec4(col,1.);
    }`
}));
bg.frustumCulled = false;
scene.add(bg);

/* --- partículas cian ascendentes --- */
const PN = reduced ? 0 : 220;
let pts=null, vel=[];
if (PN){
  const pos=new Float32Array(PN*3);
  for(let i=0;i<PN;i++){ pos[i*3]=(Math.random()-.5)*16; pos[i*3+1]=(Math.random()-.5)*9; pos[i*3+2]=(Math.random()-.5)*4;
    vel.push(.06+Math.random()*.22); }
  const g=new THREE.BufferGeometry(); g.setAttribute('position',new THREE.BufferAttribute(pos,3));
  pts=new THREE.Points(g,new THREE.PointsMaterial({ color:'#00e5ff', size:.04, transparent:true, opacity:.6,
    blending:THREE.AdditiveBlending, depthWrite:false }));
  scene.add(pts);
}

function resize(){
  renderer.setSize(innerWidth,innerHeight,false);
  camera.aspect=innerWidth/innerHeight; camera.updateProjectionMatrix();
  U.uRes.value.set(innerWidth*renderer.getPixelRatio(), innerHeight*renderer.getPixelRatio());
}
addEventListener('resize',resize); resize();

renderer.setAnimationLoop(t=>{
  U.uTime.value = t/1000;
  if (pts){
    const a=pts.geometry.attributes.position;
    for(let i=0;i<PN;i++){
      let y=a.getY(i)+vel[i]*.016; if(y>4.8)y=-4.8;
      a.setY(i,y); a.setX(i, a.getX(i)+Math.sin(t/1000*.5+i)*.0012);
    }
    a.needsUpdate=true;
  }
  renderer.render(scene,camera);
});
</script>
</body>
</html>
